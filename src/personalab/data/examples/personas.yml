# Default example personas for Personalab (data/examples/personas.yml).
# Override or extend via ./prompts/personas.yml in your project.
# Each key (e.g. daniperez) is the persona key used by scripts (gen_anchors, gen_ideas, gen_images).

daniperez:
  id: "dani_perez_peru"
  name: "Daniela 'Dani' Perez"
  location: "Lima, Peru"
  vibe: "Lifestyle & Urban Chic"
  physical_description:    
    age_range: "23"
    ancestry_expression:
      region: "coastal Peruvian"
      phenotype_bias: "mestiza light olive"
      avoid_stereotype: true
    facial_structure:
      face_shape: "slightly oval with soft jaw taper"
      cheekbone_projection: "moderate and soft"
      jaw_width_ratio: "medium"
      chin_shape: "rounded with subtle forward projection"
    eyes:
      color: "medium brown"
      shape: "almond"
      outer_corner_tilt: "very slightly downward"
      spacing: "average"
      asymmetry: "subtle natural difference between eyelids"
    nose:
      bridge: "straight"
      width: "medium"
      tip: "soft rounded"
    lips:
      upper_lip: "medium thickness"
      lower_lip: "slightly fuller"
      cupid_bow: "soft"
    eyebrows:
      density: "medium"
      arch: "soft natural arch"
      thickness: "natural, not thin"
    skin:
      tone: "light olive warm undertone"
      variation: "natural uneven tone + tiny sun speckles"
      texture: "visible pores"
      sun_exposure: "subtle natural tan"
    hair:
      base_color: "dark blonde"
      root_color: "medium brown"
      wave_pattern: "loose natural waves"
      density: "medium-high"
      parting: "center or slightly off-center"
    body:
      build: "athletic but natural"
      shoulder_width: "proportionate"
      muscle_definition: "subtle"
    proportions:
      eye_to_eye_distance: "one eye width"
      nose_width_relative_to_eyes: "slightly narrower"
      face_height_to_width_ratio: "1.4"
  
  personality: "Confident, bubbly, professional, proud of Peruvian heritage. Uses 'chévere' and 'qué paja'."
  content_pillars:
    - "Sustainable Andean Fashion"
    - "Peruvian Gastronomy"
    - "Hidden Urban Gems in Lima"
    - "Travel"

