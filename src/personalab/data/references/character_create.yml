anchor_frontal_neutral:
  purpose: "Base facial reference. Defines symmetry, eye distance, nose shape and core proportions."

  identity_lock:
    ethnicity_expression: "subtle Latin American features without caricature"
    avoid_beauty_prior: true
    realism_priority: "natural human variation over commercial attractiveness"

  subject:
    description: "${PHYSICAL_DESCRIPTION}"
    expression: "neutral, relaxed face, mouth closed"
    gaze: "directly into camera"
    accessories: "none"
    hairstyle: "consistent base hairstyle (same parting, same wave pattern, same volume)"

  framing:
    shot_type: "tight headshot"
    crop: "top of head to upper shoulders"
    angle: "frontal"
    composition: "slightly off-center (2-5%) with a tiny natural head tilt (1-2 degrees)"

  posture:
    head_position: "upright, natural alignment (not perfectly symmetrical)"
    shoulders: "relaxed and squared"

  background:
    type: "neutral interior wall with subtle texture (off-white / warm gray), softly blurred"
    color_palette: "warm neutral tones"
    avoid:
      - "pure seamless white studio"
      - "perfect gradient backdrop"
      - "busy background elements"

  lighting:
    style: "window light portrait (open shade / doorway diffusion)"
    direction: "key light 30-45 degrees from camera-left, soft fill from opposite side"
    quality: "natural daylight, gentle contrast, not perfectly even"
    asymmetry: "subtle uneven light distribution (real-world)"
    skin_texture_visibility: "high but irregular (pores vary by area, no smoothing)"
    photographic_style: "unretouched RAW portrait, natural contrast, low sharpening"
    micro_details:
      - "mild redness around nose and cheeks"
      - "subtle uneven skin tone and tiny sun speckles"
      - "slight under-eye natural shadowing"
      - "baby hairs and flyaways visible"
      - "tiny eyebrow asymmetry and eyelid asymmetry preserved"
      - "natural lip texture (not overly smooth)"
    imperfection_control: "no facial symmetry correction, no digital smoothing, no plastic sheen"
    eye_realism:
      - "natural catchlights (not perfectly symmetrical)"
      - "no hyper-sharp iris detail"
      - "natural sclera variation (not pure white)"

  camera:
    lens: "85mm"
    aperture: "f2.2"
    depth_of_field: "shallow but not extreme"
    resolution: "high resolution DSLR RAW photograph (realistic, not over-sharpened)"
    rendering:
      - "subtle film grain"
      - "mild lens softness"
      - "very subtle chromatic aberration (real lens behavior)"

  restrictions:
    - "no heavy makeup"
    - "no glasses"
    - "no hats"
    - "no beauty filters"
    - "no stylization or CGI"
    - "no exaggerated features"
    - "no extreme shadows"
    - "no background distractions"
    - "no pure seamless white studio look"
    - "no perfectly centered symmetry"
    - "no porcelain or waxy skin"
    - "no overly clean, identical eye reflections"



sculptor_45_degree:
